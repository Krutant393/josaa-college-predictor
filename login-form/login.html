<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">



  <title>JEE Main College Predictor</title>
  <link rel="stylesheet" href="style2.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">




  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="container">
    <div class="card">
      <h2>JoSAA Predictor</h2>
      <p class="subtitle">Login to continue</p>




      <form id="login-form">

              <label>Email:</label>
                  <input type="text" id="emailx" placeholder="Enter your Email">
        <br>

                    <label for="passwordx">Password:</label>
                   <input type="password" id="passwordx" placeholder="Enter your Password">
        <br>

                   <button type="button" class="forgot">Forgot password?</button>
        <button type="button" class="signup-button">New User? Sign Up</button>

  <br>
  
         <div id="g_id_onload"
       data-client_id="75641762616-sibm6o8nhkftibqf0om7v9pkdrrfumo5.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin"
                    data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
              data-type="standard"
          data-size="large"
                    data-theme="outline"
          data-text="sign_in_with"
          data-shape="rectangular"
          data-logo_alignment="left"
          data-width="340">
        </div>

        <div class="actions">
          <button type="submit" class="login-btn">Login</button>
        </div>

      </form>
    </div>
  </div>

  <script src="scriptlogin.js"></script>
</body>
</html>
